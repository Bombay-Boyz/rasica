[graph]
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml < 0.41 DoS advisories,
    # reached transitively via calamine (all releases through 0.35.0 pin
    # quick-xml ^0.39, below the fixed 0.41.0). No calamine release currently
    # resolves this. Accepted as a known, tracked gap for Phase 3's Excel
    # reader, which does process externally-sourced .xlsx files and is
    # therefore in this advisory's actual threat model — this is a real risk,
    # not a false positive, and should be revisited (`cargo deny check`) once
    # calamine ships a release depending on quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

# deny.toml
[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # No crate in the dependency tree may itself pull in unreviewed unsafe-heavy
    # FFI crates in Phase 1; extend this list as new dependencies are justified (§14.7).
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
